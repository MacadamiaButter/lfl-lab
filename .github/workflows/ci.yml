name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fast-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout lfl-lab
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          path: lfl-lab

      - name: Checkout lfl-terminal (sibling, for the two Node validator smokes)
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          repository: MacadamiaButter/lfl-terminal
          path: lfl-terminal

      - name: Run fast gates
        working-directory: lfl-lab
        env:
          LFL_TERMINAL_EXTENSION_DIR: ${{ github.workspace }}/lfl-terminal/extension
        run: bash tests/run_fast_gates.sh
