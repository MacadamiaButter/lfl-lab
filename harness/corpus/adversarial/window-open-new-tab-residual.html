     `final_url` - it never enumerates `context.pages` or listens for a new
     `page` browser event, so a navigation into a brand-new tab/browsing
     context is structurally invisible to the CURRENT runner regardless of
     what actually happened in Chrome. Making it observable would mean
     teaching runner.py to track new pages opened during a scenario (e.g.
     `context.on('page', ...)` plus deciding which of possibly several open
     pages is "the" result) - a real control-flow change to the driver, not
     a small assertion-key addition, and therefore out of scope for this
     pass under the "keep runner.py changes small" rule. Rather than fake a
     pass by asserting something the harness cannot actually see, or skip
     the vector silently, this fixture exists so the gap is at least
     runnable/inspectable by hand, and the limitation is disclosed here and
     in the accompanying report instead of hidden. The same-tab meta-refresh
     variant (meta-refresh-residual.html) covers the same disclosed
